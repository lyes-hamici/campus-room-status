spring:
  application:
    name: room-status
  cache:
    cache-names:
      - buildings
      - rooms
      - room-details
      - room-schedules

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  google:
    enabled: false
    application-name: room-status
    customer: my_customer
    delegated-user: ${GOOGLE_DELEGATED_USER:}
    service-account-key-path: ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:}
    time-zone: Europe/Paris
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    max-results-per-page: 100